name: Post Morning BTC/ETH Signal to Telegram

on:
  schedule:
    # KST 09:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  post-signal:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements-signal.txt

      - name: 시그널 게시 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_bot.py
