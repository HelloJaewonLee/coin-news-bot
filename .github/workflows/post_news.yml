name: Post Coin News to Telegram

on:
  schedule:
    # KST 기준 08:00 / 13:00 / 22:00 (UTC로 환산: 23:00 전날 / 04:00 / 13:00)
    - cron: "0 23 * * *"
    - cron: "0 4 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch: {}  # Actions 탭에서 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 뉴스 게시 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_bot.py

      - name: 게시 기록(posted_log.json) 저장
        run: |
          git config user.name "coin-news-bot"
          git config user.email "actions@github.com"
          git add posted_log.json
          git diff --quiet --cached || git commit -m "update posted log"
          git push
